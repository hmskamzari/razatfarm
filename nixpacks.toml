[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.curl", "php83Extensions.gd", "nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:clear",
    "php artisan route:clear",
    "php artisan view:clear"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=CmsSeeder --force && php artisan storage:link --force && php artisan shield:generate --all --panel=admin --no-interaction && php artisan permission:cache-reset && php artisan shield:super-admin --user=1 --panel=admin && php artisan serve --host=0.0.0.0 --port=$PORT"
