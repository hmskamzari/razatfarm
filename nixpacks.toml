[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-scripts --no-interaction",
    "npm install --ignore-scripts"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=CmsSeeder --force && php artisan storage:link --force && php artisan shield:generate --all --panel=admin --no-interaction && php artisan permission:cache-reset && php artisan shield:super-admin --user=1 --panel=admin && php artisan serve --host=0.0.0.0 --port=$PORT"
